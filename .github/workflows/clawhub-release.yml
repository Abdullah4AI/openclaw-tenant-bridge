name: ClawHub Release

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      CLAWHUB_REGISTRY: https://clawhub.ai
      CLAWHUB_REF: 4af2bd50a71465683dbf8aa269af764b9d39bdf5
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Checkout ClawHub CLI source
        uses: actions/checkout@v6
        with:
          repository: openclaw/clawhub
          ref: ${{ env.CLAWHUB_REF }}
          path: clawhub-source
          fetch-depth: 1

      - name: Install ClawHub CLI dependencies
        working-directory: clawhub-source
        run: bun install --frozen-lockfile

      - name: Verify GitHub OIDC is available
        run: |
          if [[ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" || -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ]]; then
            echo "GitHub Actions OIDC environment variables are missing." >&2
            exit 1
          fi
          echo "GitHub Actions OIDC environment variables are available."

      - name: Verify ClawHub trusted publish token mint
        run: |
          oidc_response="$(curl --fail --silent --show-error \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=clawhub")"
          oidc_token="$(printf '%s' "${oidc_response}" | jq -r '.value')"

          request_body="$(jq -n \
            --arg packageName "@abdullah4ai/openclaw-tenant-bridge" \
            --arg version "2026.4.14" \
            --arg githubOidcToken "${oidc_token}" \
            '{packageName:$packageName, version:$version, githubOidcToken:$githubOidcToken}')"

          status="$(curl --silent --show-error --output /tmp/clawhub-mint-response.json \
            --write-out '%{http_code}' \
            -X POST \
            -H 'content-type: application/json' \
            --data "${request_body}" \
            "${CLAWHUB_REGISTRY%/}/api/v1/publish/token/mint")"

          if [[ "${status}" != "200" ]]; then
            echo "Trusted publish token mint failed with HTTP ${status}." >&2
            cat /tmp/clawhub-mint-response.json >&2
            exit 1
          fi

          echo "ClawHub trusted publish token mint succeeded."

      - name: Publish to ClawHub
        run: |
          bun clawhub-source/packages/clawhub/src/cli.ts package publish . \
            --source-repo "${GITHUB_REPOSITORY}" \
            --source-commit "${GITHUB_SHA}" \
            --source-ref "${GITHUB_REF}" \
            --source-path .
